# ─────────────────────────────────────────────────────────────────────────────
#  CI/CD — Build & Deploy  |  PayDa API
#
#  Required GitHub Secrets:
#    SERVER_HOST               — IP یا hostname سرور
#    SERVER_PORT               — پورت SSH (معمولاً 22)
#    SERVER_USER               — کاربر SSH (باید root یا passwordless-sudo باشد)
#    SERVER_SSH_KEY            — محتوای private key به صورت کامل
#    APP_URL                   — آدرس پابلیک اپلیکیشن (https://api.packsi.net)
#    DB_SA_PASSWORD            — پسورد SA دیتابیس  →  پیشنهاد: P@yDa#Sql2025!SecureXZ9
#    JWT_SECRET                — کلید JWT (حداقل 32 کاراکتر) → پیشنهاد: PayDaJwt@S3cure2025#SecretKeyXZ9abcde
#    TELEGRAM_BOT_TOKEN        — توکن ربات تلگرام
#    STORAGE_CONNECTION_STRING — کانکشن استرینگ Azure Blob Storage
#
#  دامنه‌ها: api.packsi.net  |  www.api.packsi.net
#  سیستم‌عامل سرور: Ubuntu 22.04
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD — Build & Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  DEPLOY_PATH: /var/www/payda-api
  SERVICE_NAME: payda-api
  SERVICE_USER: payda
  DOMAIN: api.packsi.net
  ALT_DOMAIN: www.api.packsi.net
  CERTBOT_EMAIL: admin@packsi.net
  APP_PORT: '5000'

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Job 1: Build ────────────────────────────────────────────────────────────
  build:
    name: Build & Publish
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore PayDa.slnx

      - name: Build (Release)
        run: dotnet build PayDa.slnx --no-restore -c Release

      - name: Publish
        run: |
          dotnet publish PayDa.API/PayDa.API.csproj \
            -c Release \
            -o ./publish \
            --no-build \
            /p:UseAppHost=false

      - name: Create deployment archive
        run: tar -czf payda-api.tar.gz -C ./publish .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: payda-api-${{ github.sha }}
          path: payda-api.tar.gz
          retention-days: 3

  # ── Job 2: Deploy ───────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: payda-api-${{ github.sha }}

      # ── SSH key setup ────────────────────────────────────────────────────────
      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          # کلید به صورت base64 در Secret ذخیره شده — decode می‌کنیم
          echo "${{ secrets.SERVER_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # تأیید فرمت کلید
          ssh-keygen -l -f ~/.ssh/deploy_key || { echo "ERROR: SSH key is invalid"; exit 1; }
          ssh-keyscan -p "${{ secrets.SERVER_PORT }}" -H "${{ secrets.SERVER_HOST }}" \
            >> ~/.ssh/known_hosts 2>/dev/null

      # ── Upload archive ───────────────────────────────────────────────────────
      - name: Upload archive to server
        run: |
          scp -i ~/.ssh/deploy_key \
              -P "${{ secrets.SERVER_PORT }}" \
              payda-api.tar.gz \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/payda-api.tar.gz"

      # ── Full server setup + deploy ───────────────────────────────────────────
      # native SSH به جای appleboy/ssh-action چون appleboy در Docker اجرا می‌شود
      # و به فایل‌های filesystem runner (مثل deploy_key) دسترسی ندارد.
      # هر secret قبل از ارسال base64 می‌شود تا کاراکترهای خاص مشکل ایجاد نکنند.
      - name: Setup server & deploy
        timeout-minutes: 30
        env:
          DB_SA_PASSWORD: ${{ secrets.DB_SA_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          STORAGE_CONNECTION_STRING: ${{ secrets.STORAGE_CONNECTION_STRING }}
        run: |
          B64_DB=$(printf '%s' "${DB_SA_PASSWORD}"            | base64 -w 0)
          B64_JWT=$(printf '%s' "${JWT_SECRET}"               | base64 -w 0)
          B64_TG=$(printf '%s' "${TELEGRAM_BOT_TOKEN}"        | base64 -w 0)
          B64_ST=$(printf '%s' "${STORAGE_CONNECTION_STRING}" | base64 -w 0)

          ssh -i ~/.ssh/deploy_key \
              -p "${{ secrets.SERVER_PORT }}" \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=30 \
              "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
              "B64_DB=${B64_DB} B64_JWT=${B64_JWT} B64_TG=${B64_TG} B64_ST=${B64_ST} bash -s" << 'DEPLOY_SCRIPT'
          set -euo pipefail

          # decode کردن secrets از base64
          export DB_SA_PASSWORD=$(echo "${B64_DB}"  | base64 -d)
          export JWT_SECRET=$(echo "${B64_JWT}"     | base64 -d)
          export TELEGRAM_BOT_TOKEN=$(echo "${B64_TG}" | base64 -d)
          export STORAGE_CONNECTION_STRING=$(echo "${B64_ST}" | base64 -d)
          export DEBIAN_FRONTEND=noninteractive

          DEPLOY_PATH="/var/www/payda-api"
          SERVICE_NAME="payda-api"
          SERVICE_USER="payda"
          DOMAIN="api.packsi.net"
          ALT_DOMAIN="www.api.packsi.net"
          CERTBOT_EMAIL="admin@packsi.net"
          APP_PORT="5000"

          log() { echo "[$(date '+%Y-%m-%d %H:%M:%S')] $*"; }

          # ─────────────────────────────────────────────────────────────────
          # 1. پیش‌نیازهای سیستم
          # ─────────────────────────────────────────────────────────────────
          log "Installing system prerequisites..."
          apt-get update -qq
          apt-get install -y -qq \
            curl wget gnupg2 apt-transport-https ca-certificates \
            software-properties-common gettext-base lsb-release \
            unzip snapd ufw

          # ─────────────────────────────────────────────────────────────────
          # 2. .NET 10 ASP.NET Core Runtime
          # ─────────────────────────────────────────────────────────────────
          if ! dotnet --version 2>/dev/null | grep -q '^10\.'; then
            log "Installing .NET 10 ASP.NET Core Runtime..."
            wget -q https://dot.net/v1/dotnet-install.sh -O /tmp/dotnet-install.sh
            chmod +x /tmp/dotnet-install.sh
            /tmp/dotnet-install.sh --channel 10.0 --runtime aspnetcore --install-dir /usr/share/dotnet
            ln -sf /usr/share/dotnet/dotnet /usr/bin/dotnet
            echo 'export DOTNET_ROOT=/usr/share/dotnet' > /etc/profile.d/dotnet.sh
            rm -f /tmp/dotnet-install.sh
          fi
          export DOTNET_ROOT=/usr/share/dotnet
          log ".NET version: $(dotnet --version)"

          # ─────────────────────────────────────────────────────────────────
          # 3. SQL Server 2022
          # ─────────────────────────────────────────────────────────────────
          if ! systemctl is-active --quiet mssql-server 2>/dev/null; then
            log "Installing SQL Server 2022..."

            curl -fsSL https://packages.microsoft.com/keys/microsoft.asc \
              | gpg --dearmor > /usr/share/keyrings/microsoft-prod.gpg

            printf 'deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/mssql-server-2022 jammy main\n' \
              > /etc/apt/sources.list.d/mssql-server.list

            apt-get update -qq
            apt-get install -y -qq mssql-server

            MSSQL_SA_PASSWORD="${DB_SA_PASSWORD}" MSSQL_PID="Developer" \
              /opt/mssql/bin/mssql-conf -n setup accept-eula

            systemctl start mssql-server
            systemctl enable mssql-server

            log "Waiting for SQL Server to initialize (30s)..."
            sleep 30
          fi
          log "SQL Server status: $(systemctl is-active mssql-server)"

          # SQL Server command-line tools
          if [ ! -f /opt/mssql-tools18/bin/sqlcmd ]; then
            log "Installing mssql-tools18..."
            printf 'deb [arch=amd64 signed-by=/usr/share/keyrings/microsoft-prod.gpg] https://packages.microsoft.com/ubuntu/22.04/prod jammy main\n' \
              >> /etc/apt/sources.list.d/mssql-tools.list
            apt-get update -qq
            ACCEPT_EULA=Y apt-get install -y -qq mssql-tools18 unixodbc-dev
            echo 'export PATH="$PATH:/opt/mssql-tools18/bin"' > /etc/profile.d/mssql.sh
          fi
          export PATH="$PATH:/opt/mssql-tools18/bin"

          # ─────────────────────────────────────────────────────────────────
          # 4. Nginx
          # ─────────────────────────────────────────────────────────────────
          if ! command -v nginx &>/dev/null; then
            log "Installing Nginx..."
            apt-get install -y -qq nginx
            systemctl enable nginx
          fi

          # ─────────────────────────────────────────────────────────────────
          # 5. Certbot (Let's Encrypt)
          # ─────────────────────────────────────────────────────────────────
          if ! command -v certbot &>/dev/null; then
            log "Installing Certbot..."
            apt-get install -y -qq certbot python3-certbot-nginx
          fi

          # ─────────────────────────────────────────────────────────────────
          # 6. کانفیگ Nginx — HTTP (قبل از دریافت SSL)
          # ─────────────────────────────────────────────────────────────────
          log "Configuring Nginx..."
          cat << 'NGINXCONF' | envsubst '${DOMAIN} ${ALT_DOMAIN} ${APP_PORT}' \
            > /etc/nginx/sites-available/${SERVICE_NAME}
          server {
              listen 80;
              listen [::]:80;
              server_name ${DOMAIN} ${ALT_DOMAIN};

              location / {
                  proxy_pass         http://127.0.0.1:${APP_PORT};
                  proxy_http_version 1.1;
                  proxy_set_header   Upgrade $http_upgrade;
                  proxy_set_header   Connection keep-alive;
                  proxy_set_header   Host $host;
                  proxy_cache_bypass $http_upgrade;
                  proxy_set_header   X-Real-IP $remote_addr;
                  proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header   X-Forwarded-Proto $scheme;
                  proxy_set_header   X-Forwarded-Host $host;
                  proxy_read_timeout 300;
                  proxy_connect_timeout 300;
                  client_max_body_size 50M;
              }
          }
          NGINXCONF

          ln -sf /etc/nginx/sites-available/${SERVICE_NAME} \
                 /etc/nginx/sites-enabled/${SERVICE_NAME}
          rm -f /etc/nginx/sites-enabled/default
          nginx -t && systemctl reload nginx

          # ─────────────────────────────────────────────────────────────────
          # 7. گواهی SSL با Certbot
          # ─────────────────────────────────────────────────────────────────
          if [ ! -d "/etc/letsencrypt/live/${DOMAIN}" ]; then
            log "Obtaining SSL certificate for ${DOMAIN} and ${ALT_DOMAIN}..."
            certbot --nginx \
                    -d "${DOMAIN}" \
                    -d "${ALT_DOMAIN}" \
                    --non-interactive \
                    --agree-tos \
                    --email "${CERTBOT_EMAIL}" \
                    --redirect
          else
            log "SSL certificate exists — running renewal check..."
            certbot renew --quiet --no-self-upgrade
          fi

          # ─────────────────────────────────────────────────────────────────
          # 8. کاربر سرویس
          # ─────────────────────────────────────────────────────────────────
          id "${SERVICE_USER}" &>/dev/null || \
            useradd --system --no-create-home --shell /bin/false "${SERVICE_USER}"

          # ─────────────────────────────────────────────────────────────────
          # 9. استقرار فایل‌های برنامه
          # ─────────────────────────────────────────────────────────────────
          log "Deploying application..."
          systemctl stop "${SERVICE_NAME}" 2>/dev/null || true

          mkdir -p "${DEPLOY_PATH}"

          # بکاپ از نسخه قبلی
          if [ -f "${DEPLOY_PATH}/PayDa.API.dll" ]; then
            BACKUP_DIR="${DEPLOY_PATH}.bak.$(date +%Y%m%d_%H%M%S)"
            cp -r "${DEPLOY_PATH}" "${BACKUP_DIR}"
            log "Backup created: ${BACKUP_DIR}"
            ls -dt "${DEPLOY_PATH}.bak."* 2>/dev/null | tail -n +4 | xargs rm -rf || true
          fi

          tar -xzf /tmp/payda-api.tar.gz -C "${DEPLOY_PATH}"

          # ─────────────────────────────────────────────────────────────────
          # 10. فایل appsettings.Production.json روی سرور
          # ─────────────────────────────────────────────────────────────────
          log "Writing production configuration..."
          cat > "${DEPLOY_PATH}/appsettings.Production.json" << JSONEOF
          {
            "ConnectionStrings": {
              "DefaultConnection": "Server=localhost;Database=PayDaDb;User Id=sa;Password=${DB_SA_PASSWORD};TrustServerCertificate=True;Encrypt=True"
            },
            "Jwt": {
              "Secret": "${JWT_SECRET}"
            },
            "Telegram": {
              "BotToken": "${TELEGRAM_BOT_TOKEN}"
            },
            "Storage": {
              "ConnectionString": "${STORAGE_CONNECTION_STRING}",
              "ContainerName": "payda"
            },
            "AllowedHosts": "*"
          }
          JSONEOF
          chmod 600 "${DEPLOY_PATH}/appsettings.Production.json"

          # ─────────────────────────────────────────────────────────────────
          # 11. Systemd service
          # ─────────────────────────────────────────────────────────────────
          log "Configuring systemd service..."
          cat << 'SVCEOF' | envsubst '${DEPLOY_PATH} ${SERVICE_NAME} ${SERVICE_USER} ${APP_PORT}' \
            > /etc/systemd/system/${SERVICE_NAME}.service
          [Unit]
          Description=PayDa API — ASP.NET Core 10
          After=network.target mssql-server.service
          Requires=mssql-server.service

          [Service]
          Type=notify
          WorkingDirectory=${DEPLOY_PATH}
          ExecStart=/usr/bin/dotnet ${DEPLOY_PATH}/PayDa.API.dll
          Restart=on-failure
          RestartSec=10
          KillSignal=SIGINT
          User=${SERVICE_USER}
          Group=${SERVICE_USER}
          Environment=ASPNETCORE_ENVIRONMENT=Production
          Environment=ASPNETCORE_URLS=http://127.0.0.1:${APP_PORT}
          Environment=DOTNET_ROOT=/usr/share/dotnet
          Environment=DOTNET_PRINT_TELEMETRY_MESSAGE=false
          StandardOutput=journal
          StandardError=journal
          SyslogIdentifier=${SERVICE_NAME}

          [Install]
          WantedBy=multi-user.target
          SVCEOF

          # ─────────────────────────────────────────────────────────────────
          # 12. مجوزها و راه‌اندازی سرویس
          # ─────────────────────────────────────────────────────────────────
          chown -R "${SERVICE_USER}:${SERVICE_USER}" "${DEPLOY_PATH}"

          systemctl daemon-reload
          systemctl enable "${SERVICE_NAME}"
          systemctl start "${SERVICE_NAME}"

          log "Waiting for service to start..."
          sleep 8

          if systemctl is-active --quiet "${SERVICE_NAME}"; then
            log "Service started successfully."
          else
            log "ERROR: Service failed to start. Last 50 log lines:"
            journalctl -u "${SERVICE_NAME}" --no-pager -n 50
            exit 1
          fi

          # ─────────────────────────────────────────────────────────────────
          # 13. پیکربندی Firewall
          # ─────────────────────────────────────────────────────────────────
          ufw allow OpenSSH      2>/dev/null || true
          ufw allow 'Nginx Full' 2>/dev/null || true
          ufw --force enable     2>/dev/null || true

          rm -f /tmp/payda-api.tar.gz

          log "======================================================"
          log " Deployment complete!"
          log " API is live at: https://${DOMAIN}"
          log " Swagger UI   : https://${DOMAIN}/swagger"
          log "======================================================"
          DEPLOY_SCRIPT

          